name: Daily Research Refresh

on:
  schedule:
    # Two distinct GitHub-hosted cron slots, gated by REFRESH_MODE below.
    # The Perplexity-Computer-managed crons (BMO 9 AM ET, AMC 6:15 PM ET)
    # remain the primary refresh path; these workflow_run slots act as a
    # repo-side safety net that always pushes a clean commit even if the
    # Computer cron is unavailable.
    - cron: '0 10 * * 1-5'   # 6am ET  weekdays — BMO run (pre-market)
    - cron: '30 21 * * 1-5'  # 5:30pm ET weekdays — AMC run (post-close)
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Regenerate all notes even if they exist'
        required: false
        default: 'false'
      dry_run:
        description: 'Print actions without writing files or calling APIs'
        required: false
        default: 'false'
      notes_only:
        description: 'Run only note generation (skip market data refresh)'
        required: false
        default: 'false'

env:
  # PERPLEXITY_API_KEY intentionally omitted.
  # All LLM work is queued to automation/queue/pending_tasks.json and
  # processed by Perplexity Computer. See automation/queue/README.md.
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'false' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  MAX_PRE_EARNINGS_DAYS: '14'
  MAX_POST_EARNINGS_DAYS: '14'
  # REFRESH_MODE is set per-run by the "Set REFRESH_MODE" step below. The
  # previous expression-based ternary collapsed to a boolean inside GitHub
  # Actions, which made every scheduled run silently fall back to "full".

# Grant the workflow's GITHUB_TOKEN write access to repository contents so
# the commit/push step at the end can land changes on main. Without this
# block the default token is read-only on repos created after 2023 and
# `git push` returns 403 for github-actions[bot].
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set REFRESH_MODE
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 10 * * 1-5" ]; then
              echo "REFRESH_MODE=bmo" >> $GITHUB_ENV
            elif [ "${{ github.event.schedule }}" = "30 21 * * 1-5" ]; then
              echo "REFRESH_MODE=amc" >> $GITHUB_ENV
            else
              echo "REFRESH_MODE=full" >> $GITHUB_ENV
            fi
          else
            echo "REFRESH_MODE=full" >> $GITHUB_ENV
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # If SIGNALAI_GH_PAT secret is present (classic PAT with repo scope
          # or fine-grained PAT with Contents: Read and write), use it so the
          # push can bypass branch-protection rules that require PR review.
          # Otherwise fall back to the workflow GITHUB_TOKEN (granted write
          # access via the permissions block above).
          token: ${{ secrets.SIGNALAI_GH_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests yfinance python-dotenv

      - name: Install Node dependencies
        run: npm install @supabase/supabase-js

      - name: Run daily refresh
        if: ${{ github.event.inputs.notes_only != 'true' }}
        run: python -m automation.jobs.daily_refresh

      - name: Run notes only
        if: ${{ github.event.inputs.notes_only == 'true' }}
        # Read directly from the already-committed earnings_calendar.json
        # rather than re-running event detection. Both pre_earnings_notes
        # and post_earnings_notes consume the calendar JSON directly, so
        # an extra earnings_events invocation here was redundant work
        # that could also flip same-day BMO/AMC categorisation back to
        # "pre" before the notes step had a chance to run.
        run: |
          python -m automation.jobs.pre_earnings_notes
          python -m automation.jobs.post_earnings_notes

      - name: Commit generated notes and data
        run: |
          git config user.name "signalai-bot"
          git config user.email "bot@signalai"
          git add notes/ data/ archive/ automation/queue/ \
            earnings_notes_index.json \
            earnings_calendar.json \
            earnings_data.json \
            earnings_intel.json \
            weekly_briefing.json \
            macro_data.json \
            data-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            # Rebase-pull in case a parallel push (weekly briefing or
            # manual dispatch) landed while this run was working.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
