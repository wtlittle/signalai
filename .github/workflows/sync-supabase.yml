name: Sync Watchlist to Supabase

on:
  push:
    branches: [main]
    paths: ['utils.js']

jobs:
  sync:
    runs-on: ubuntu-latest

    # Only run if the push was made by the repo owner or the Perplexity bot
    if: >-
      github.actor == 'wtlittle' ||
      contains(github.event.head_commit.author.name, 'wtlittle') ||
      contains(github.event.head_commit.committer.name, 'root')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Sync watchlist to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/sync-tickers.mjs
